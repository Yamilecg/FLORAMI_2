<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cotización de Viaje</title>
  <link rel="stylesheet" href="/styles/style_viaje.css">
</head>
<body>

<a href="/index.html" class="back-btn">←</a>

<div class="container">
  <h1>Formulario de Cotización de Viaje</h1>

  <form id="form">

    <!-- DATOS GENERALES -->
    <div class="card">
      <h2>Datos Generales</h2>
      <input type="text" name="Nombre_Viaje" placeholder="Nombre / Apellido / Título del viaje">
    </div>

    <!-- FECHAS -->
    <div class="card">
      <h2>Fechas</h2>
      <div class="grid-2">
        <input type="date" name="fecha_inicio">
        <input type="date" name="fecha_fin">
      </div>
    </div>

    <!-- DESTINOS -->
    <div class="card">
      <h2>Destinos</h2>

      <div id="destinos-container">
        <div class="destino">
          <input type="text" name="destino" placeholder="Destino">
          <input type="text" name="hospedaje" placeholder="Hospedaje">
          <button type="button" class="remove">X</button>
        </div>
      </div>

      <button type="button" id="add-destino" class="add-btn">+ Agregar destino</button>
    </div>

    <!-- PASAJEROS -->
    <div class="card">
      <h2>Pasajeros</h2>

      <div id="pasajeros-container">
        <div class="pasajero">
          <input type="text" name="nombre" placeholder="Nombre(s)">
          <input type="text" name="apellidos" placeholder="Apellido(s)">
          <input type="number" name="edad" placeholder="Edad">
          <button type="button" class="remove">X</button>
        </div>
      </div>

      <button type="button" id="add-pasajero" class="add-btn">+ Agregar pasajero</button>
    </div>

    <!-- VUELOS -->
    <div class="card">
      <h2>Trayectos de Vuelo</h2>
      <div class="tabla-vuelos-wrapper">
        <table class="tabla-vuelos" id="tabla-vuelos">
          <thead>
            <tr>
              <th>Fecha</th>
              <th>Origen</th>
              <th>Destino</th>
              <th>Línea Aérea</th>
              <th>Sale</th>
              <th>Llega</th>
              <th>Costo</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="vuelos-extra-container">
            <tr class="vuelo-extra">
              <td><input type="date" name="fecha_vuelo"></td>
              <td><input type="text" name="origen" placeholder="Origen"></td>
              <td><input type="text" name="destino" placeholder="Destino"></td>
              <td><input type="text" name="aerolinea" placeholder="Línea Aérea"></td>
              <td><input type="time" name="hora_sale"></td>
              <td><input type="time" name="hora_llega"></td>
              <td><input type="text" name="costo_vuelo" placeholder="$"></td>
              <td><button type="button" class="remove">X</button></td>
            </tr>
          </tbody>
        </table>
      </div>

      <button type="button" id="add-vuelo-extra" class="add-btn">+ Agregar vuelo</button>
    </div>


    <!-- ITINERARIO -->
    <div class="card">
      <h2>Itinerario</h2>

      <div id="itinerario-container">
        <div class="itinerario-item">
          <input type="text" name="dia" placeholder="Día 1">
          <textarea name="descripcion" placeholder="Descripción"></textarea>
          <button type="button" class="remove">X</button>
        </div>
      </div>

      <button type="button" id="add-itinerario" class="add-btn">+ Agregar día</button>
    </div>

   <!-- TEXTOS -->
    <div class="card">
      <h2>Beneficios</h2>
      <textarea name="beneficios" placeholder="Beneficios del Viaje..."></textarea>
    </div>

    <div class="card">
      <h2>Restricciones</h2>
      <textarea name="restricciones" placeholder="Restricciones del viaje"></textarea>
    </div>

    <div class="card">
      <h2>Actividades</h2>
      <textarea name="actividades_detalladas" placeholder="Ingrese las actividades del crucero..."></textarea>
    </div>

    <div class="card">
      <h2>Plan de Alimentos</h2>
      <textarea name="plan_alimentos" placeholder="Ingrese el Plan de alimentación..."></textarea>
    </div>

    <div class="botones-descarga">
      <button type="submit" class="submit-btn btn-docx">
        ⬇ Descargar DOCX
      </button>
      <button type="button" class="submit-btn btn-pdf" id="btn-pdf">
        ⬇ Descargar PDF
      </button>
    </div>

  </form>
</div>

<script src="/add_viaje.js"></script>
<script src="/app_viaje.js"></script>

</body>
</html>
